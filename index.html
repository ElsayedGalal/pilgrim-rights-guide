<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <!-- التحويل التلقائي للرابط الجديد -->
    <meta http-equiv="refresh" content="0; url=https://ht.ithraa.com.sa/">
    
    <script>
        // تحويل فوري باستخدام الجافاسكريبت لضمان أفضل تجربة
        window.location.href = "https://ht.ithraa.com.sa/";
    </script>
    
    <title>إثراء الجود - جارٍ التحويل</title>
</head>
<body style="background-color: #00334D; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">
    
    <div style="text-align: center; color: white;">
        <h2 style="margin-bottom: 15px;">جارٍ توجيهكم للمنصة الرسمية...</h2>
        <!-- حلقة تحميل (Spinner) بتصميم ذهبي -->
        <div style="border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #C29979; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto;"></div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
