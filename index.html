<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <!-- السطر ده أهم سطر: بيحول المستخدم بعد 0 ثانية للرابط الجديد -->
    <meta http-equiv="refresh" content="0; url=https://رابط-الشركة-الجديد.com">
    
    <script>
        // زيادة تأكيد للتحويل الفوري عن طريق الجافاسكريبت
        window.location.href = "https://رابط-الشركة-الجديد.com";
    </script>
    
    <title>إثراء الجود - جارٍ التحويل</title>
</head>
<body style="background-color: #00334D; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <!-- رسالة بسيطة تظهر لكسر من الثانية أثناء التحويل -->
    <div style="text-align: center; color: white; font-family: sans-serif;">
        <h2 style="margin-bottom: 10px;">جارٍ توجيهكم للمنصة الرسمية...</h2>
        <div style="border: 4px solid #f3f3f3; border-top: 4px solid #C29979; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: auto;"></div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
